name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore backend/CaudalesBackend.Tests/CaudalesBackend.Tests.csproj

      - name: Build
        run: dotnet build backend/CaudalesBackend.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test backend/CaudalesBackend.Tests/CaudalesBackend.Tests.csproj --no-restore --configuration Release
